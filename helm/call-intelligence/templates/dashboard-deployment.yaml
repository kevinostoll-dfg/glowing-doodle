apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "call-intelligence.fullname" . }}-dashboard
  labels:
    {{- include "call-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
      {{- include "call-intelligence.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
        {{- include "call-intelligence.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
