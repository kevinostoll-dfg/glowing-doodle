{{/*
NOTE: In production, use sealed-secrets or external-secrets-operator
instead of storing secrets directly in Helm values.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "call-intelligence.fullname" . }}-secrets
  labels:
    {{- include "call-intelligence.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "call-intelligence.databaseUrl" . | quote }}
  REDIS_URL: {{ include "call-intelligence.redisUrl" . | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  DEEPGRAM_API_KEY: {{ .Values.secrets.deepgramApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  S3_ENDPOINT: {{ .Values.secrets.s3Endpoint | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
