apiVersion: v1
kind: Service
metadata:
  name: {{ include "call-intelligence.fullname" . }}-call-handler
  labels:
    {{- include "call-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: call-handler
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.callHandler.port }}
      targetPort: {{ .Values.callHandler.port }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: call-handler
    {{- include "call-intelligence.selectorLabels" . | nindent 4 }}
