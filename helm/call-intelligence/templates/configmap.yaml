apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "call-intelligence.fullname" . }}-config
  labels:
    {{- include "call-intelligence.labels" . | nindent 4 }}
data:
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  S3_BUCKET: {{ .Values.secrets.s3Bucket | quote }}
