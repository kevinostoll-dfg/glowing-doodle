apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "call-intelligence.fullname" . }}-worker
  labels:
    {{- include "call-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      {{- include "call-intelligence.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        {{- include "call-intelligence.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "-Q", "{{ .Values.worker.queues }}"]
          envFrom:
            - configMapRef:
                name: {{ include "call-intelligence.fullname" . }}-config
            - secretRef:
                name: {{ include "call-intelligence.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
